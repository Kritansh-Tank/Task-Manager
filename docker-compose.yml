version: '3.8'

services:
  server:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
    volumes:
      - task-data:/app/data
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - '3000:3000'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  task-data:
